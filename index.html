<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lịch Tập Gym & Thống Kê</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #f4f4f9;
                margin: 0;
                min-height: 100vh;
                padding: 20px;
                box-sizing: border-box;
            }

            /* Container chính chứa cả 2 cột */
            .main-wrapper {
                display: flex;
                gap: 30px;
                width: 100%;
                max-width: 900px;
                background: #fff;
                border-radius: 20px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
                padding: 30px;
                box-sizing: border-box;
            }

            /* Cột trái: Lịch */
            .calendar-section {
                flex: 2;
                position: relative;
                border-right: 2px dashed #eee;
                padding-right: 30px;
            }

            /* Cột phải: Thống kê */
            .stats-section {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
            .stats-title {
                font-size: 20px;
                font-weight: 600;
                color: #555;
                margin-bottom: 20px;
            }
            .stat-box {
                background: #fff0f0;
                border: 2px solid #ffe5e5;
                border-radius: 20px;
                padding: 30px;
                width: 100%;
                box-sizing: border-box;
                transition: transform 0.2s;
            }
            .stat-box:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(255, 59, 48, 0.1);
            }
            .stat-number {
                font-size: 64px;
                font-weight: bold;
                color: #ff3b30;
                line-height: 1;
                margin-bottom: 10px;
            }
            .stat-label {
                font-size: 18px;
                font-weight: 500;
                color: #ff3b30;
            }

            /* Phần UI của Lịch (giữ nguyên độ đẹp) */
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
            }
            .header button {
                background: none;
                border: none;
                font-size: 24px;
                color: #ff3b30;
                cursor: pointer;
                padding: 8px 16px;
                border-radius: 8px;
                transition: 0.2s;
            }
            .header button:hover {
                background-color: #ffe5e5;
            }

            .date-picker-trigger {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 22px;
                color: #ff3b30;
                font-weight: 600;
                cursor: pointer;
                padding: 8px 16px;
                border-radius: 10px;
                transition: background 0.2s;
            }
            .date-picker-trigger:hover {
                background-color: #ffe5e5;
            }
            .dropdown-icon {
                font-size: 12px;
                margin-top: 2px;
            }

            /* Panel chọn ngày ẩn */
            .date-picker-panel {
                position: absolute;
                top: 60px;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                border: 1px solid #ddd;
                border-radius: 15px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
                padding: 20px;
                z-index: 10;
                width: 280px;
                display: none;
                opacity: 0;
                transition:
                    opacity 0.3s ease,
                    transform 0.3s ease;
            }
            .date-picker-panel.visible {
                display: block;
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            .panel-sections {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .month-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                text-align: center;
            }
            .month-grid div {
                padding: 10px;
                cursor: pointer;
                border-radius: 8px;
                transition: 0.2s;
                font-size: 15px;
                font-weight: 500;
            }
            .month-grid div:hover {
                background-color: #f0f0f0;
            }
            .month-grid div.selected {
                background-color: #ff3b30;
                color: white;
            }

            #yearSelectPanel {
                width: 100%;
                font-size: 18px;
                padding: 10px;
                border: 2px solid #eee;
                border-radius: 8px;
                outline: none;
                color: #ff3b30;
                cursor: pointer;
                font-weight: bold;
                text-align: center;
            }

            .weekdays {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                text-align: center;
                font-weight: bold;
                margin-bottom: 15px;
                font-size: 16px;
                color: #888;
            }
            .days {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                row-gap: 10px;
            }
            .day-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .day {
                width: 45px;
                height: 45px;
                display: flex;
                justify-content: center;
                align-items: center;
                cursor: pointer;
                font-size: 18px;
                border-radius: 50%;
                transition: 0.2s ease-in-out;
                font-weight: 500;
            }
            .day:hover:not(.active) {
                background-color: #f0f0f0;
                transform: scale(1.1);
            }
            .day-wrapper.empty {
                visibility: hidden;
            }
            .day.active {
                background-color: #ff3b30;
                color: white;
                box-shadow: 0 4px 12px rgba(255, 59, 48, 0.4);
            }

            /* Responsive cho điện thoại */
            @media (max-width: 768px) {
                .main-wrapper {
                    flex-direction: column;
                    padding: 20px;
                    gap: 20px;
                }
                .calendar-section {
                    border-right: none;
                    border-bottom: 2px dashed #eee;
                    padding-right: 0;
                    padding-bottom: 20px;
                }
                .day {
                    width: 40px;
                    height: 40px;
                    font-size: 16px;
                }
                .stat-box {
                    padding: 20px;
                }
                .stat-number {
                    font-size: 48px;
                }
            }
        </style>
    </head>
    <body>
        <div class="main-wrapper">
            <div class="calendar-section">
                <div class="header">
                    <button id="prevBtn">&lt;</button>
                    <div class="date-picker-trigger" id="datePickerTrigger">
                        <span id="monthYearDisplay">Tháng ..., Năm ....</span>
                        <div class="dropdown-icon">&#9662;</div>
                    </div>
                    <button id="nextBtn">&gt;</button>
                </div>

                <div class="date-picker-panel" id="datePickerPanel">
                    <div class="panel-sections">
                        <div class="month-section">
                            <div class="month-grid" id="monthGrid"></div>
                        </div>
                        <div class="year-section">
                            <select id="yearSelectPanel"></select>
                        </div>
                    </div>
                </div>

                <div class="weekdays">
                    <div>T2</div>
                    <div>T3</div>
                    <div>T4</div>
                    <div>T5</div>
                    <div>T6</div>
                    <div>T7</div>
                    <div>CN</div>
                </div>
                <div class="days" id="days"></div>
            </div>

            <div class="stats-section">
                <div class="stats-title">Thống kê tháng này</div>
                <div class="stat-box">
                    <div class="stat-number" id="monthlyCount">0</div>
                    <div class="stat-label">buổi tập</div>
                </div>
            </div>
        </div>

        <script>
            const monthYearDisplay =
                document.getElementById("monthYearDisplay");
            const datePickerTrigger =
                document.getElementById("datePickerTrigger");
            const datePickerPanel = document.getElementById("datePickerPanel");
            const monthGrid = document.getElementById("monthGrid");
            const yearSelectPanel = document.getElementById("yearSelectPanel");
            const daysContainer = document.getElementById("days");
            const prevBtn = document.getElementById("prevBtn");
            const nextBtn = document.getElementById("nextBtn");
            const monthlyCountDisplay = document.getElementById("monthlyCount");

            let currentDate = new Date();
            let gymDays =
                JSON.parse(localStorage.getItem("gymTrackData")) || {};

            const vnMonthNames = [
                "T1",
                "T2",
                "T3",
                "T4",
                "T5",
                "T6",
                "T7",
                "T8",
                "T9",
                "T10",
                "T11",
                "T12",
            ];
            for (let i = 0; i < 12; i++) {
                const monthDiv = document.createElement("div");
                monthDiv.textContent = vnMonthNames[i];
                monthDiv.dataset.month = i;
                monthDiv.addEventListener("click", (e) => {
                    currentDate.setMonth(parseInt(e.target.dataset.month));
                    renderCalendar();
                    closeDatePicker();
                });
                monthGrid.appendChild(monthDiv);
            }

            const currentYear = new Date().getFullYear();
            for (let i = currentYear - 5; i <= currentYear + 5; i++) {
                const option = document.createElement("option");
                option.value = i;
                option.textContent = i;
                yearSelectPanel.appendChild(option);
            }
            yearSelectPanel.addEventListener("change", (e) => {
                currentDate.setFullYear(parseInt(e.target.value));
                renderCalendar();
                closeDatePicker();
            });

            function renderCalendar() {
                daysContainer.innerHTML = "";
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                monthYearDisplay.textContent = `Tháng ${month + 1}, ${year}`;
                yearSelectPanel.value = year;
                Array.from(monthGrid.children).forEach((div, index) => {
                    div.classList.toggle("selected", index === month);
                });

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const startDay = firstDay === 0 ? 6 : firstDay - 1;

                let currentMonthWorkoutCount = 0;

                for (let i = 0; i < startDay; i++) {
                    const emptyWrapper = document.createElement("div");
                    emptyWrapper.classList.add("day-wrapper", "empty");
                    daysContainer.appendChild(emptyWrapper);
                }

                for (let i = 1; i <= daysInMonth; i++) {
                    const wrapper = document.createElement("div");
                    wrapper.classList.add("day-wrapper");

                    const dayDiv = document.createElement("div");
                    dayDiv.classList.add("day");
                    dayDiv.textContent = i;

                    const dateString = `${year}-${month + 1}-${i}`;

                    if (gymDays[dateString]) {
                        dayDiv.classList.add("active");
                        currentMonthWorkoutCount++; // Tăng biến đếm nếu ngày đó có tập
                    }

                    dayDiv.addEventListener("click", () => {
                        if (gymDays[dateString]) {
                            delete gymDays[dateString];
                            dayDiv.classList.remove("active");
                            currentMonthWorkoutCount--; // Giảm đi 1
                        } else {
                            gymDays[dateString] = true;
                            dayDiv.classList.add("active");
                            currentMonthWorkoutCount++; // Tăng lên 1
                        }
                        localStorage.setItem(
                            "gymTrackData",
                            JSON.stringify(gymDays),
                        );
                        // Cập nhật số liệu hiển thị ngay lập tức
                        monthlyCountDisplay.textContent =
                            currentMonthWorkoutCount;
                    });

                    wrapper.appendChild(dayDiv);
                    daysContainer.appendChild(wrapper);
                }

                // Hiển thị tổng số buổi tập ra màn hình
                monthlyCountDisplay.textContent = currentMonthWorkoutCount;
            }

            function toggleDatePicker() {
                if (datePickerPanel.classList.contains("visible")) {
                    closeDatePicker();
                } else {
                    renderCalendar();
                    datePickerPanel.classList.add("visible");
                }
            }

            function closeDatePicker() {
                datePickerPanel.classList.remove("visible");
            }

            datePickerTrigger.addEventListener("click", (e) => {
                e.stopPropagation();
                toggleDatePicker();
            });

            document.addEventListener("click", (e) => {
                if (
                    datePickerPanel.classList.contains("visible") &&
                    !datePickerPanel.contains(e.target) &&
                    !datePickerTrigger.contains(e.target)
                ) {
                    closeDatePicker();
                }
            });

            prevBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });

            nextBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });

            renderCalendar();
        </script>
    </body>
</html>
